name: candidates-platform
region: nyc
services:
  - name: api
    github:
      repo: imreenzi/candidates-platform
      branch: main
      deploy_on_push: true
    build_command: cd api && npm install --production
    run_command: cd api && npm start
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: APIFY_TOKEN
        value: ""
        type: SECRET
